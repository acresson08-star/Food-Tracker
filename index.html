<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0b0d12"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NutriTracker"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icone-192.png"/>
<title>NutriTracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0b0d12; --surface: #13161e; --surface2: #1a1e28; --border: #252935;
  --accent: #c8f060; --text: #e8ecf4; --muted: #6b7280;
  --cal-color: #f0a060; --prot-color: #60c8f0; --carb-color: #c8f060; --fat-color: #f060a8;
  --radius: 12px;
  --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }
#app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
header { padding: calc(14px + var(--safe-top)) 20px 12px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.logo { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; }
.logo span { color: var(--accent); }
.date-nav { display: flex; align-items: center; gap: 8px; }
.date-nav button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 8px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
#current-date { font-size: .78rem; font-weight: 600; color: var(--muted); min-width: 88px; text-align: center; }
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { flex: 1; padding: 10px; font-size: .72rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; text-align: center; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all .2s; font-family: 'Syne', sans-serif; background: none; border-top: none; border-left: none; border-right: none; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
main { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(16px + var(--safe-bottom)); }
.page { display: none; } .page.active { display: block; }
.summary { padding: 14px; }
.macro-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
.macro-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 6px; text-align: center; position: relative; overflow: hidden; }
.macro-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.macro-card.cal::before { background: var(--cal-color); } .macro-card.prot::before { background: var(--prot-color); }
.macro-card.carb::before { background: var(--carb-color); } .macro-card.fat::before { background: var(--fat-color); }
.macro-val { font-size: 1.2rem; font-weight: 800; font-family: 'DM Mono', monospace; line-height: 1.1; }
.macro-val.cal { color: var(--cal-color); } .macro-val.prot { color: var(--prot-color); }
.macro-val.carb { color: var(--carb-color); } .macro-val.fat { color: var(--fat-color); }
.macro-label { font-size: .57rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
.macro-goal { font-size: .6rem; color: var(--muted); font-family: 'DM Mono', monospace; }
.progress-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.prog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.prog-row:last-child { margin-bottom: 0; }
.prog-name { font-size: .67rem; font-weight: 700; text-transform: uppercase; width: 44px; flex-shrink: 0; }
.prog-bar-wrap { flex: 1; height: 7px; background: var(--bg); border-radius: 4px; overflow: hidden; }
.prog-bar { height: 100%; border-radius: 4px; transition: width .5s ease; max-width: 100%; }
.prog-bar.cal { background: var(--cal-color); } .prog-bar.prot { background: var(--prot-color); }
.prog-bar.carb { background: var(--carb-color); } .prog-bar.fat { background: var(--fat-color); }
.prog-nums { font-size: .62rem; font-family: 'DM Mono', monospace; color: var(--muted); width: 78px; text-align: right; flex-shrink: 0; }
.section-title { font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 12px 14px 6px; }
.meal-section { margin: 0 14px 10px; }
.meal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.meal-title { font-size: .83rem; font-weight: 700; }
.meal-cals { font-size: .72rem; color: var(--muted); font-family: 'DM Mono', monospace; }
.add-to-meal { background: var(--accent); color: var(--bg); border: none; border-radius: 8px; padding: 5px 11px; font-size: .72rem; font-weight: 700; cursor: pointer; font-family: 'Syne', sans-serif; }
.food-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 9px 11px; margin-bottom: 5px; display: flex; align-items: center; gap: 9px; }
.food-info { flex: 1; min-width: 0; }
.food-name { font-size: .82rem; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.food-brand { font-size: .65rem; color: var(--muted); margin-bottom: 2px; }
.food-qty { font-size: .67rem; color: var(--muted); font-family: 'DM Mono', monospace; }
.food-macros { display: flex; gap: 4px; font-size: .63rem; font-family: 'DM Mono', monospace; flex-wrap: wrap; margin-top: 3px; }
.food-macros span { padding: 1px 5px; border-radius: 4px; }
.food-macros .c { background: rgba(240,160,96,.15); color: var(--cal-color); }
.food-macros .p { background: rgba(96,200,240,.15); color: var(--prot-color); }
.food-macros .g { background: rgba(200,240,96,.15); color: var(--carb-color); }
.food-macros .l { background: rgba(240,96,168,.15); color: var(--fat-color); }
.del-btn { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 4px; flex-shrink: 0; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .25s; backdrop-filter: blur(5px); }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 18px 18px calc(18px + var(--safe-bottom)); width: 100%; max-height: 90dvh; display: flex; flex-direction: column; transform: translateY(30px); transition: transform .25s; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
.modal-title { font-size: .95rem; font-weight: 700; margin-bottom: 10px; }
.source-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
.src-btn { flex: 1; padding: 7px; border-radius: 8px; font-size: .72rem; font-weight: 700; font-family: 'Syne', sans-serif; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); transition: all .2s; }
.src-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.cat-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 8px; scrollbar-width: none; }
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-btn { flex-shrink: 0; padding: 5px 10px; border-radius: 20px; font-size: .68rem; font-weight: 700; font-family: 'Syne', sans-serif; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); white-space: nowrap; transition: all .2s; }
.cat-btn.active { background: var(--surface2); color: var(--text); border-color: var(--text); }
.search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 13px; color: var(--text); font-size: .88rem; font-family: 'Syne', sans-serif; outline: none; margin-bottom: 8px; }
.search-input:focus { border-color: var(--accent); }
.search-status { font-size: .72rem; color: var(--muted); padding: 3px 0 5px; min-height: 20px; }
.food-list { overflow-y: auto; flex: 1; }
.food-list-item { padding: 9px 11px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background .15s; border-bottom: 1px solid var(--border); }
.food-list-item:active { background: var(--surface2); }
.fli-left { flex: 1; min-width: 0; }
.fli-name { font-size: .83rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fli-brand { font-size: .63rem; color: var(--muted); }
.fli-sub { font-size: .63rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 1px; }
.fli-cal { font-size: .78rem; font-weight: 700; color: var(--cal-color); font-family: 'DM Mono', monospace; white-space: nowrap; margin-left: 8px; }
.off-badge { display: inline-block; font-size: .55rem; background: rgba(96,200,240,.15); color: var(--prot-color); border-radius: 3px; padding: 1px 4px; margin-left: 5px; font-weight: 700; }
.qty-modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 18px 18px calc(18px + var(--safe-bottom)); width: 100%; transform: translateY(30px); transition: transform .25s; }
.modal-overlay.open .qty-modal { transform: translateY(0); }
.qty-food-name { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
.qty-food-brand { font-size: .72rem; color: var(--muted); margin-bottom: 12px; }
.qty-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.qty-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); font-size: 1.1rem; font-weight: 700; font-family: 'DM Mono', monospace; text-align: center; outline: none; }
.qty-input:focus { border-color: var(--accent); }
.qty-unit { color: var(--muted); font-size: .83rem; font-weight: 600; }
.qty-preview { background: var(--bg); border-radius: 10px; padding: 12px; display: flex; justify-content: space-around; margin-bottom: 14px; }
.qp-item { text-align: center; }
.qp-val { font-size: .95rem; font-weight: 800; font-family: 'DM Mono', monospace; }
.qp-lbl { font-size: .58rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
.confirm-btn { width: 100%; background: var(--accent); color: var(--bg); border: none; border-radius: 12px; padding: 14px; font-size: .95rem; font-weight: 800; cursor: pointer; font-family: 'Syne', sans-serif; }
.cancel-btn { width: 100%; background: none; border: none; color: var(--muted); font-size: .82rem; cursor: pointer; padding: 10px; font-family: 'Syne', sans-serif; }
.goals-page { padding: 16px; }
.goals-page h2 { font-size: 1.05rem; font-weight: 800; margin-bottom: 16px; }
.goal-field { margin-bottom: 12px; }
.goal-field label { display: block; font-size: .72rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.goal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 13px; color: var(--text); font-size: .95rem; font-family: 'DM Mono', monospace; font-weight: 700; outline: none; }
.goal-input:focus { border-color: var(--accent); }
.save-btn { width: 100%; background: var(--accent); color: var(--bg); border: none; border-radius: 12px; padding: 14px; font-size: .95rem; font-weight: 800; cursor: pointer; font-family: 'Syne', sans-serif; margin-top: 6px; }
.history-page { padding: 16px; }
.history-page h2 { font-size: 1.05rem; font-weight: 800; margin-bottom: 14px; }
.history-day { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 13px; margin-bottom: 9px; }
.hd-date { font-size: .78rem; font-weight: 700; margin-bottom: 5px; text-transform: capitalize; }
.hd-macros { display: flex; gap: 10px; font-size: .68rem; font-family: 'DM Mono', monospace; flex-wrap: wrap; }
.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty-state .emoji { font-size: 2.5rem; margin-bottom: 10px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Nutri<span>Track</span></div>
    <div class="date-nav">
      <button onclick="changeDay(-1)">‹</button>
      <div id="current-date"></div>
      <button onclick="changeDay(1)">›</button>
    </div>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="showPage('journal',this)">Journal</button>
    <button class="tab" onclick="showPage('stats',this)">Stats</button>
    <button class="tab" onclick="showPage('goals',this)">Objectifs</button>
  </div>
  <main>
    <div class="page active" id="page-journal">
      <div class="summary">
        <div class="macro-grid">
          <div class="macro-card cal"><div class="macro-val cal" id="sum-cal">0</div><div class="macro-label">kcal</div><div class="macro-goal" id="goal-cal-d">/ 2000</div></div>
          <div class="macro-card prot"><div class="macro-val prot" id="sum-prot">0g</div><div class="macro-label">Protéines</div><div class="macro-goal" id="goal-prot-d">/ 150g</div></div>
          <div class="macro-card carb"><div class="macro-val carb" id="sum-carb">0g</div><div class="macro-label">Glucides</div><div class="macro-goal" id="goal-carb-d">/ 200g</div></div>
          <div class="macro-card fat"><div class="macro-val fat" id="sum-fat">0g</div><div class="macro-label">Lipides</div><div class="macro-goal" id="goal-fat-d">/ 70g</div></div>
        </div>
        <div class="progress-section">
          <div class="prog-row"><div class="prog-name" style="color:var(--cal-color)">Kcal</div><div class="prog-bar-wrap"><div class="prog-bar cal" id="bar-cal" style="width:0%"></div></div><div class="prog-nums" id="pn-cal">0 / 2000</div></div>
          <div class="prog-row"><div class="prog-name" style="color:var(--prot-color)">Prot.</div><div class="prog-bar-wrap"><div class="prog-bar prot" id="bar-prot" style="width:0%"></div></div><div class="prog-nums" id="pn-prot">0 / 150g</div></div>
          <div class="prog-row"><div class="prog-name" style="color:var(--carb-color)">Gluc.</div><div class="prog-bar-wrap"><div class="prog-bar carb" id="bar-carb" style="width:0%"></div></div><div class="prog-nums" id="pn-carb">0 / 200g</div></div>
          <div class="prog-row"><div class="prog-name" style="color:var(--fat-color)">Lip.</div><div class="prog-bar-wrap"><div class="prog-bar fat" id="bar-fat" style="width:0%"></div></div><div class="prog-nums" id="pn-fat">0 / 70g</div></div>
        </div>
      </div>
      <div class="section-title">Repas du jour</div>
      <div id="meals-container"></div>
    </div>
    <div class="page" id="page-stats"><div class="history-page"><h2>Historique</h2><div id="history-list"></div></div></div>
    <div class="page" id="page-goals">
      <div class="goals-page">
        <h2>Mes objectifs</h2>
        <div class="goal-field"><label>Calories (kcal)</label><input class="goal-input" id="g-cal" type="number" inputmode="numeric"/></div>
        <div class="goal-field"><label>Protéines (g)</label><input class="goal-input" id="g-prot" type="number" inputmode="numeric"/></div>
        <div class="goal-field"><label>Glucides (g)</label><input class="goal-input" id="g-carb" type="number" inputmode="numeric"/></div>
        <div class="goal-field"><label>Lipides (g)</label><input class="goal-input" id="g-fat" type="number" inputmode="numeric"/></div>
        <button class="save-btn" id="save-goals-btn" onclick="saveGoals()">Enregistrer</button>
      </div>
    </div>
  </main>
</div>

<!-- SEARCH MODAL -->
<div class="modal-overlay" id="search-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Ajouter un aliment</div>
    <div class="source-toggle">
      <button class="src-btn active" id="src-local" onclick="setSource('local')">🥦 Base locale</button>
      <button class="src-btn" id="src-off" onclick="setSource('off')">🌐 Open Food Facts</button>
    </div>
    <div class="cat-scroll" id="cat-scroll"></div>
    <input class="search-input" id="food-search" placeholder="Rechercher..." autocomplete="off" autocorrect="off" autocapitalize="off"/>
    <div class="search-status" id="search-status"></div>
    <div class="food-list" id="food-list-container"></div>
  </div>
</div>

<!-- QTY MODAL -->
<div class="modal-overlay" id="qty-modal">
  <div class="qty-modal">
    <div class="modal-handle"></div>
    <div class="qty-food-name" id="qty-food-name"></div>
    <div class="qty-food-brand" id="qty-food-brand"></div>
    <div class="qty-row">
      <input class="qty-input" id="qty-input" type="number" value="100" min="1" max="2000" inputmode="decimal" oninput="updateQtyPreview()"/>
      <span class="qty-unit">grammes</span>
    </div>
    <div class="qty-preview">
      <div class="qp-item"><div class="qp-val" id="qp-cal" style="color:var(--cal-color)">0</div><div class="qp-lbl">kcal</div></div>
      <div class="qp-item"><div class="qp-val" id="qp-prot" style="color:var(--prot-color)">0g</div><div class="qp-lbl">prot</div></div>
      <div class="qp-item"><div class="qp-val" id="qp-carb" style="color:var(--carb-color)">0g</div><div class="qp-lbl">gluc</div></div>
      <div class="qp-item"><div class="qp-val" id="qp-fat" style="color:var(--fat-color)">0g</div><div class="qp-lbl">lip</div></div>
    </div>
    <button class="confirm-btn" onclick="confirmAdd()">Ajouter au repas</button>
    <button class="cancel-btn" onclick="closeQtyModal()">Annuler</button>
  </div>
</div>

let currentDate = new Date();

let selectedFood = null;

const MEAL_TYPES = [
  {id:'breakfast', label:'🌅 Petit-déjeuner'},
  {id:'lunch',     label:'☀️ Déjeuner'},
  {id:'snack',     label:'🍎 Collation'},
  {id:'dinner',    label:'🌙 Dîner'},
];

const formatDate = d => d.toISOString().split('T')[0];
function displayDate(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dd = new Date(d); dd.setHours(0,0,0,0);
  const diff = Math.round((dd-today)/86400000);
  if (diff===0) return "Aujourd'hui";
  if (diff===-1) return "Hier";
  if (diff===1) return "Demain";
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}

// ============================================================
// STORAGE
// ============================================================
function save() {
  try {
    localStorage.setItem('nt_log3', JSON.stringify(log));
    localStorage.setItem('nt_goals3', JSON.stringify(goals));
  } catch(e) {}
}
function load() {
  try { log = JSON.parse(localStorage.getItem('nt_log3'))||{}; } catch(e) { log={}; }
  try { const g=JSON.parse(localStorage.getItem('nt_goals3')); if(g) goals=g; } catch(e) {}
}

// ============================================================
// HELPERS
// ============================================================
function getDayLog() {
  const d = formatDate(currentDate);
  if (!log[d]) log[d] = { meals: MEAL_TYPES.map(m=>({id:m.id,label:m.label,items:[]})) };
  return log[d];
}
function calcItem(item) {
  const r = item.qty/100;
  return { cal:(item.food.cal||0)*r, prot:(item.food.prot||0)*r, carb:(item.food.carb||0)*r, fat:(item.food.fat||0)*r };
}
function calcDay(dl) {
  const t={cal:0,prot:0,carb:0,fat:0};
  if (!dl) return t;
  dl.meals.forEach(m=>m.items.forEach(i=>{const c=calcItem(i);t.cal+=c.cal;t.prot+=c.prot;t.carb+=c.carb;t.fat+=c.fat;}));
  return t;
}
function offToFood(p) {
  const n=p.nutriments||{};
  return { name:p.product_name||p.product_name_fr||'Produit inconnu', brand:p.brands||'',
    cal:Math.round(n['energy-kcal_100g']||n['energy-kcal']||0),
    prot:Math.round((n['proteins_100g']||0)*10)/10,
    carb:Math.round((n['carbohydrates_100g']||0)*10)/10,
    fat:Math.round((n['fat_100g']||0)*10)/10, source:'off' };
}

// RENDER
// ============================================================
function render() {
  document.getElementById('current-date').textContent = displayDate(currentDate);
  renderSummary(); renderMeals(); renderGoalsForm();
}
function renderSummary() {
  const t=calcDay(getDayLog());
  document.getElementById('sum-cal').textContent=Math.round(t.cal);
  document.getElementById('sum-prot').textContent=Math.round(t.prot)+'g';
  document.getElementById('sum-carb').textContent=Math.round(t.carb)+'g';
  document.getElementById('sum-fat').textContent=Math.round(t.fat)+'g';
  document.getElementById('goal-cal-d').textContent='/ '+goals.cal;
  document.getElementById('goal-prot-d').textContent='/ '+goals.prot+'g';
  document.getElementById('goal-carb-d').textContent='/ '+goals.carb+'g';
  document.getElementById('goal-fat-d').textContent='/ '+goals.fat+'g';
  const pct=(v,g)=>Math.min(100,g>0?Math.round(v/g*100):0)+'%';
  ['cal','prot','carb','fat'].forEach(k=>{
    document.getElementById('bar-'+k).style.width=pct(t[k],goals[k]);
    document.getElementById('pn-'+k).textContent=Math.round(t[k])+' / '+goals[k]+(k==='cal'?'':'g');
  });
}
function renderMeals() {
  const day=getDayLog();
  const c=document.getElementById('meals-container');
  c.innerHTML='';
  day.meals.forEach((meal,mi)=>{
    const totCal=meal.items.reduce((a,i)=>a+calcItem(i).cal,0);
    const sec=document.createElement('div'); sec.className='meal-section';
    sec.innerHTML=`<div class="meal-header">
      <div class="meal-title">${meal.label}</div>
      <div style="display:flex;align-items:center;gap:7px">
        <span class="meal-cals">${Math.round(totCal)} kcal</span>
        <button class="add-to-meal" onclick="openSearch(${mi})">+ Ajouter</button>
      </div>
    </div>`;
    if (!meal.items.length) {
      const e=document.createElement('div');
      e.style.cssText='padding:6px 0 3px;color:var(--muted);font-size:.75rem;';
      e.textContent='Vide'; sec.appendChild(e);
    }
    meal.items.forEach((item,ii)=>{
      const c2=calcItem(item);
      const div=document.createElement('div'); div.className='food-item';
      div.innerHTML=`<div class="food-info">
        <div class="food-name">${item.food.name}</div>
        ${item.food.brand?`<div class="food-brand">${item.food.brand}</div>`:''}
        <div class="food-qty">${item.qty}g${item.food.source==='off'?'<span class="off-badge">OFF</span>':''}</div>
        <div class="food-macros">
          <span class="c">${Math.round(c2.cal)} kcal</span>
          <span class="p">P ${Math.round(c2.prot)}g</span>
          <span class="g">G ${Math.round(c2.carb)}g</span>
          <span class="l">L ${Math.round(c2.fat)}g</span>
        </div>
      </div>
      <button class="del-btn" onclick="deleteItem(${mi},${ii})">✕</button>`;
      sec.appendChild(div);
    });
    c.appendChild(sec);
  });
}
function renderGoalsForm() {
  document.getElementById('g-cal').value=goals.cal;
  document.getElementById('g-prot').value=goals.prot;
  document.getElementById('g-carb').value=goals.carb;
  document.getElementById('g-fat').value=goals.fat;
}
function renderHistory() {
  const container=document.getElementById('history-list');
  const keys=Object.keys(log).sort((a,b)=>b.localeCompare(a));
  if (!keys.length) { container.innerHTML='<div class="empty-state"><div class="emoji">📭</div><p>Aucun historique</p></div>'; return; }
  container.innerHTML=keys.map(k=>{
    const t=calcDay(log[k]);
    const d=new Date(k);
    const label=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    return `<div class="history-day">
      <div class="hd-date">${label}</div>
      <div class="hd-macros">
        <span style="color:var(--cal-color)">${Math.round(t.cal)} kcal</span>
        <span style="color:var(--prot-color)">P ${Math.round(t.prot)}g</span>
        <span style="color:var(--carb-color)">G ${Math.round(t.carb)}g</span>
        <span style="color:var(--fat-color)">L ${Math.round(t.fat)}g</span>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// ACTIONS
// ============================================================
function changeDay(d) {
  currentDate=new Date(currentDate);
  currentDate.setDate(currentDate.getDate()+d);
  render();
}
function deleteItem(mi,ii) { getDayLog().meals[mi].items.splice(ii,1); save(); render(); }
function saveGoals() {
  goals.cal=parseInt(document.getElementById('g-cal').value)||2000;
  goals.prot=parseInt(document.getElementById('g-prot').value)||150;
  goals.carb=parseInt(document.getElementById('g-carb').value)||200;
  goals.fat=parseInt(document.getElementById('g-fat').value)||70;
  save(); renderSummary();
  const btn=document.getElementById('save-goals-btn');
  btn.textContent='✓ Enregistré !';
  setTimeout(()=>btn.textContent='Enregistrer',1500);
}
function showPage(name,el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  if (name==='stats') renderHistory();
}

// ============================================================
// SEARCH MODAL
// ============================================================
function buildCatBar() {
  const bar=document.getElementById('cat-scroll');
  const all=['Tous',...CATEGORIES];
  bar.innerHTML=all.map(c=>`<button class="cat-btn${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}

function setCat(cat) {
  activeCat=cat;
  buildCatBar();
  const q=document.getElementById('food-search').value.trim();
  renderLocalList(q);
}

function setSource(src) {
  searchSource=src;
  document.getElementById('src-local').classList.toggle('active',src==='local');
  document.getElementById('src-off').classList.toggle('active',src==='off');
  document.getElementById('food-search').value='';
  document.getElementById('search-status').textContent='';
  document.getElementById('food-list-container').innerHTML='';
  document.getElementById('cat-scroll').style.display=src==='local'?'flex':'none';
  if (src==='local') { buildCatBar(); renderLocalList(''); }
  else document.getElementById('search-status').textContent='Tapez pour rechercher sur Open Food Facts...';
  document.getElementById('food-search').placeholder=src==='local'?'Rechercher dans la base locale...':'Marque, produit... (ex: Danone, Bjorg, Activia)';
  document.getElementById('food-search').focus();
}

function openSearch(mealIdx) {
  selectedMeal=mealIdx;
  activeCat='Tous';
  document.getElementById('food-search').value='';
  document.getElementById('search-status').textContent='';
  document.getElementById('food-list-container').innerHTML='';
  document.getElementById('search-modal').classList.add('open');
  setSource('local');
}

document.getElementById('food-search').addEventListener('input',function(){
  const q=this.value.trim();
  if (searchSource==='local') { renderLocalList(q); return; }
  clearTimeout(searchTimer);
  if (q.length<2) { document.getElementById('search-status').textContent='Tapez au moins 2 caractères...'; document.getElementById('food-list-container').innerHTML=''; return; }
  document.getElementById('search-status').innerHTML='<span class="spinner"></span>Recherche...';
  searchTimer=setTimeout(()=>searchOFF(q),600);
});

function renderLocalList(q) {
  const n=q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  let filtered=LOCAL_FOODS;
  if (activeCat!=='Tous') filtered=filtered.filter(f=>f.cat===activeCat);
  if (n) filtered=filtered.filter(f=>f.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(n));
  const c=document.getElementById('food-list-container');
  document.getElementById('search-status').textContent=filtered.length+' aliments';
  if (!filtered.length) { c.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:.83rem;">Aucun résultat</div>'; return; }
  c.innerHTML=filtered.slice(0,100).map(f=>{
    const idx=LOCAL_FOODS.indexOf(f);
    return `<div class="food-list-item" onclick="selectLocalFood(${idx})">
      <div class="fli-left">
        <div class="fli-name">${f.name}</div>
        <div class="fli-sub">P ${f.prot}g · G ${f.carb}g · L ${f.fat}g (100g)</div>
      </div>
      <div class="fli-cal">${f.cal} kcal</div>
    </div>`;
  }).join('');
}

async function searchOFF(query) {
  const status=document.getElementById('search-status');
  const container=document.getElementById('food-list-container');
  try {
    const url = `https://world.openfoodfacts.org/api/v2/search?search_terms=${encodeURIComponent(query)}&page_size=30&fields=product_name,product_name_fr,brands,nutriments&sort_by=unique_scans_n`;
    const res=await fetch(url);
    if (!res.ok) throw new Error();
    const data=await res.json();
    const products=(data.products||[]).filter(p=>{
      const n=p.nutriments||{};
      return (p.product_name||p.product_name_fr)&&(n['energy-kcal_100g']||n['energy-kcal']);
    });
    offResults=products.map(offToFood);
    status.textContent=offResults.length?offResults.length+' produits trouvés':'Aucun résultat avec données nutritionnelles';
    if (!offResults.length) { container.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:.83rem;">Essayez en anglais ou avec le nom de marque</div>'; return; }
    container.innerHTML=offResults.map((f,i)=>`
      <div class="food-list-item" onclick="selectOFFFood(${i})">
        <div class="fli-left">
          <div class="fli-name">${f.name}</div>
          ${f.brand?`<div class="fli-brand">${f.brand}</div>`:''}
          <div class="fli-sub">P ${f.prot}g · G ${f.carb}g · L ${f.fat}g (100g)</div>
        </div>
        <div class="fli-cal">${f.cal} kcal</div>
      </div>`).join('');
  } catch(e) {
    status.textContent='Erreur de connexion';
    container.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:.83rem;">Impossible de contacter Open Food Facts. Utilisez la base locale.</div>';
  }
}

function selectLocalFood(idx) { openQtyModal({...LOCAL_FOODS[idx], source:'local'}); }
function selectOFFFood(idx) { openQtyModal(offResults[idx]); }

function openQtyModal(food) {
  selectedFood=food;
  document.getElementById('search-modal').classList.remove('open');
  document.getElementById('qty-food-name').textContent=food.name;
  document.getElementById('qty-food-brand').textContent=food.brand||'';
  document.getElementById('qty-input').value=100;
  updateQtyPreview();
  document.getElementById('qty-modal').classList.add('open');
  setTimeout(()=>{const i=document.getElementById('qty-input');i.focus();i.select();},300);
}
function updateQtyPreview() {
  if (!selectedFood) return;
  const r=(parseFloat(document.getElementById('qty-input').value)||0)/100;
  document.getElementById('qp-cal').textContent=Math.round(selectedFood.cal*r);
  document.getElementById('qp-prot').textContent=Math.round(selectedFood.prot*r)+'g';
  document.getElementById('qp-carb').textContent=Math.round(selectedFood.carb*r)+'g';
  document.getElementById('qp-fat').textContent=Math.round(selectedFood.fat*r)+'g';
}
function confirmAdd() {
  const qty=parseFloat(document.getElementById('qty-input').value);
  if (!qty||qty<=0) return;
  getDayLog().meals[selectedMeal].items.push({food:selectedFood,qty});
  save(); render(); closeQtyModal();
}
function closeQtyModal() { document.getElementById('qty-modal').classList.remove('open'); }
document.getElementById('search-modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.getElementById('qty-modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

// ============================================================
// INIT
// ============================================================
load(); render();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
</script>
</body>
</html>
